  padding: 12px;
}

.panda-textarea {
  width: 100%;
  background: var(--pp-input-bg);
  border: 2px solid var(--pp-input-border);
  border-radius: var(--pp-radius-rect);
  padding: var(--pp-space-3) var(--pp-space-4);
  box-sizing: border-box;
  transition: border-color var(--pp-transition);
}
.panda-textarea:focus-within {
  border-color: var(--pp-input-border-focus);
}
.panda-textarea--disabled {
  opacity: 0.6;
  pointer-events: none;
}
.panda-textarea__field {
  width: 100%;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--pp-input-text);
  font: var(--pp-font-text);
  font-family: var(--pp-font-family);
  resize: none;
  min-height: 96px;
  line-height: 1.5;
  padding: 0;
  box-sizing: border-box;
}
.panda-textarea__field::placeholder {
  color: var(--pp-input-placeholder);
}

.panda-context-menu {
  position: absolute;
  min-width: 220px;
  background: var(--pp-modal-bg);
  border: 1px solid var(--pp-foreground-10);
  border-radius: var(--pp-radius-rect);
  padding: 7px;
  z-index: var(--pp-z-context-menu);
  font-family: var(--pp-font-family);
  backdrop-filter: blur(var(--pp-blur));
  -webkit-backdrop-filter: blur(var(--pp-blur));
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  animation: panda-context-menu-in 0.15s ease;
}
@keyframes panda-context-menu-in {
  from {
    opacity: 0;
    transform: scale(0.96);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
.panda-context-menu__list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.panda-context-menu__item {
  display: flex;
}
.panda-context-menu__action {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--pp-space-2);
  width: 100%;
  min-height: 40px;
  padding: var(--pp-space-1) var(--pp-space-2);
  background: transparent;
  border: 0;
  border-radius: var(--pp-radius-rect);
  color: var(--pp-item-text);
  text-align: left;
  text-decoration: none;
  cursor: pointer;
  transition: background var(--pp-transition), color var(--pp-transition);
  box-sizing: border-box;
}
.plyr .panda-context-menu__action,
.panda-context-menu__action {
  font-family: var(--pp-font-family);
  font-size: 14px;
  font-style: normal;
  font-weight: 600 !important;
  line-height: normal;
}
.panda-context-menu__action:hover,
.panda-context-menu__action:focus-visible {
  background: var(--pp-button-secondary-bg-hover);
  color: var(--pp-modal-title);
  outline: none;
}
.panda-context-menu__label {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.panda-context-menu__chevron {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--pp-item-text);
}
.panda-context-menu__chevron svg {
  width: 6px;
  height: 8px;
}

.panda-hotkeys-list {
  display: flex;
  flex-direction: column;
  list-style: none;
  margin: 0;
  padding: var(--pp-space-4);
  gap: var(--pp-space-4);
  background: var(--pp-modal-bg);
  border-radius: 16px;
  border: 0;
}
.panda-hotkeys-list__item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--pp-space-3);
  padding: 0;
  border: 0;
}
.panda-hotkeys-list__label {
  font: 600 14px/1 var(--pp-font-family);
  color: var(--pp-item-text);
}
.panda-hotkeys-list__keys {
  display: inline-flex;
  align-items: center;
  gap: var(--pp-space-2);
  color: var(--pp-item-text);
  font: 500 13px/1 var(--pp-font-family);
}
.panda-hotkeys-list__keys kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--pp-space-1) var(--pp-space-2);
  background: rgba(255, 255, 255, 0.1);
  border: 0;
  border-radius: 4px;
  color: var(--pp-item-text);
  font: 500 13px/1 var(--pp-font-family);
  min-height: 0;
}
.panda-hotkeys-list__sep {
  color: var(--pp-item-text);
  font: 500 13px/1 var(--pp-font-family);
}
[data-theme="light"] .panda-hotkeys-list__keys kbd,
[data-theme="auto"] .panda-hotkeys-list__keys kbd {
  background: rgba(15, 15, 25, 0.06);
}

.panda-report-body {
  display: flex;
  flex-direction: column;
  gap: var(--pp-space-6);
}
.panda-report-question {
  margin: 0;
  font: var(--pp-font-title);
  color: var(--pp-modal-title);
}
.panda-report-options {
  display: flex;
  flex-direction: column;
  gap: var(--pp-space-4);
}
.panda-report-options .panda-card {
  flex-shrink: 0;
}
.panda-report-textarea {
  margin-top: var(--pp-space-2);
  animation: panda-fade-in 0.2s ease;
}
@keyframes panda-fade-in {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panda-report-submit--sent {
  background: var(--pp-success-bg) !important;
  color: var(--pp-button-primary-text, #FFF) !important;
  opacity: 1 !important;
  cursor: default !important;
  pointer-events: none;
}
.panda-side-panel[data-panel="report"] .panda-side-panel__footer .panda-btn {
  height: 48px;
}
.panda-side-panel[data-panel="report"] .panda-side-panel__footer {
  min-height: 80px;
  box-sizing: border-box;
}
.panda-report-submit--sent:hover {
  background: var(--pp-success-bg) !important;
}
.panda-report-submit--sent .panda-btn__icon {
  width: 20px;
  height: 20px;
}
.panda-report-submit--sent .panda-btn__icon svg {
  width: 20px;
  height: 20px;
}
.panda-report-submit--sent .panda-btn__icon svg circle {
  fill: #fff;
}
.panda-report-submit--sent .panda-btn__icon svg path {
  stroke: var(--pp-success-bg);
}
